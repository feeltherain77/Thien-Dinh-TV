name: TamQuoc Auto Update
on:
  schedule:
    - cron: '*/20 * * * *' # Tự động quét 20 phút một lần
  workflow_dispatch:      # Nút bấm chạy tay cho Mạnh
  push:
    branches: [ main ]

jobs:
  update_task:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Quyền cực quan trọng để ghi file
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install requests

      - name: Run Robot Tam Quoc
        run: python get_link.py

      - name: Push to GitHub (Fix Lỗi 128)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add list.m3u
          
          # Chỉ commit nếu có link mới, tránh chạy thừa
          if git diff --staged --quiet; then
            echo "Không có trận mới, bỏ qua commit."
            exit 0
          fi
          
          git commit -m "Tam Quốc TV Update: $(date)"
          
          # Dùng Token để ép GitHub cho phép ghi đè
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push origin main
          
